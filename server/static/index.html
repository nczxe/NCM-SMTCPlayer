<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SMTC">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="SMTC Player">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="/style.css">
    <title>SMTC Player</title>
</head>
<body>
    <div class="auth-overlay" id="authOverlay">
        <form class="auth-panel" id="authForm">
            <div class="auth-title" id="authTitle">输入访问 PIN</div>
            <input type="password" id="authPin" class="auth-input" maxlength="16" placeholder="4-16 位 PIN" autocomplete="current-password">
            <button class="btn-primary" id="authSubmit" type="submit">进入控制器</button>
            <div class="auth-message" id="authMessage"></div>
        </form>
    </div>

    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="container">
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="nowplaying">正在播放</button>
            <button class="tab-btn" data-tab="search">搜索</button>
            <button class="tab-btn" data-tab="playlist">歌单</button>
        </div>

        <div class="tab-content active" id="tab-nowplaying">
            <div class="album-art" id="albumArt">🎵</div>

            <div class="song-info">
                <div class="song-title" id="songTitle">加载中...</div>
                <div class="song-artist" id="songArtist">-</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn small" id="prevBtn" onclick="control('previous')">⏮</button>
                <button class="control-btn large" id="playPauseBtn" onclick="control('play_pause')">▶</button>
                <button class="control-btn small" id="nextBtn" onclick="control('next')">⏭</button>
            </div>

            <div class="volume-container">
                <span class="volume-icon" id="volumeIcon" onclick="toggleMute()">🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" step="1">
                <span class="volume-value" id="volumeValue">50%</span>
            </div>
        </div>

        <div class="tab-content" id="tab-search">
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索歌曲..." autocomplete="off">
                <span class="search-icon">🔍</span>
            </div>
            <div class="song-list" id="searchResults">
                <div class="empty-state">
                    <div class="icon">🎶</div>
                    <div>输入关键词搜索歌曲</div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-playlist">
            <div id="playlistLoginSection">
                <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:10px;line-height:1.6;">
                    1. 浏览器打开 music.163.com 并登录<br>
                    2. F12 → Application → Cookies → 找到 <b>MUSIC_U</b><br>
                    3. 复制其<b>值</b>粘贴到下方
                </p>
                <input type="text" id="loginCookie" placeholder="粘贴 MUSIC_U cookie 值" style="width:100%;padding:12px 16px;margin-bottom:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:15px;outline:none;">
                <button class="btn-primary" onclick="doLogin('cookie')">Cookie 登录</button>
                <div id="loginError" style="color:#e74c3c;font-size:13px;text-align:center;margin-top:8px;display:none;"></div>
            </div>
            <div id="playlistLoggedIn" class="hidden">
                <div class="logged-in-bar">
                    <span class="user-info" id="playlistUserInfo"></span>
                    <button class="logout-btn" onclick="doLogout()">退出登录</button>
                </div>
                <div class="playlist-grid" id="playlistGrid"></div>
            </div>
            <div id="playlistDetail" class="hidden">
                <div class="playlist-header" onclick="backToPlaylists()">← 返回歌单列表</div>
                <div class="song-list" id="playlistSongList"></div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-text">
                <span class="status-dot"></span>
                <span id="statusText">已连接</span>
            </div>
        </div>
    </div>

    <script src="/api.js"></script>
    <script src="/auth.js"></script>
    <script src="/player.js"></script>
</body>
</html>
